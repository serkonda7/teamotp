<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamOTP</title>
  </head>
  <body>
    <h1>TeamOTP</h1>

    <h2>Add New Code</h2>
    <form id="add-form">
      <div>
        <label for="label">Label:</label>
        <input type="text" id="label" required>
      </div>
      <div>
        <label for="issuer">Issuer:</label>
        <input type="text" id="issuer">
      </div>
      <div>
        <label for="secret">Secret:</label>
        <input type="text" id="secret" required>
      </div>
      <button type="submit">Add</button>
    </form>

    <h2>OTP Codes</h2>
    <ul id="codes-list">
      <li>Loading...</li>
    </ul>

    <script src="./app.js"></script>
  </body>
</html>
